<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Portal — Courses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/portal.css">
</head>
<body>

  <header class="site-header">
    <div class="shell">
      <div class="brand">Microlearning <span class="brand-mark">Portal</span></div>
      <div class="student-chip">
        <span id="student-id-display">—</span>
        <button id="sign-out-btn" type="button">Not you?</button>
      </div>
    </div>
  </header>

  <main>
    <div class="shell">
      <div class="page-title-row">
        <p class="eyebrow">Your Courses</p>
        <h1>Choose a lesson to continue.</h1>
      </div>

      <div class="course-list" id="course-list">
        <!-- populated by JS from CourseCatalog -->
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="shell">Microlearning Portal · your progress is tracked automatically per lesson</div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/course-catalog.js"></script>
  <script>
    (function () {
      const studentId = Storage.getStudentId();
      if (!studentId) {
        window.location.href = 'index.html';
        return;
      }
      document.getElementById('student-id-display').textContent = studentId;

      document.getElementById('sign-out-btn').addEventListener('click', function () {
        Storage.clearStudentId();
        window.location.href = 'index.html';
      });

      const listEl = document.getElementById('course-list');

      // NOTE: the "Completed" badge below is a purely cosmetic, LOCAL-ONLY
      // convenience for the student's own browser — it reads a flag this
      // same browser set after a successful completion send (see
      // js/tracking.js -> markLessonCompleteLocally, wired in lesson pages).
      // It is NOT part of the analytics system and is NOT authoritative:
      // it doesn't reflect the Activity Log, can fall out of sync if the
      // student clears storage or switches browsers, and the instructor's
      // Dashboard sheet remains the only source of truth for who actually
      // completed what. This exists purely so the student doesn't lose
      // track of "have I done this one yet" while scrolling a long list.
      CourseCatalog.forEach(function (course, idx) {
        const courseCard = document.createElement('details');
        courseCard.className = 'course-card';
        if (idx === 0) courseCard.open = true; // expand the first course by default

        const summary = document.createElement('summary');
        summary.innerHTML =
          '<div class="course-card-title">' +
            '<span class="course-id-tag">' + course.courseCode + '</span>' +
            '<h2>' + course.courseName + '</h2>' +
          '</div>' +
          '<svg class="disclosure-arrow" width="8" height="14" viewBox="0 0 8 14" fill="none" aria-hidden="true">' +
            '<path d="M1 1L7 7L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
          '</svg>';
        courseCard.appendChild(summary);

        course.chapters.forEach(function (chapter) {
          const chapterBlock = document.createElement('div');
          chapterBlock.className = 'chapter-block';

          const heading = document.createElement('h3');
          heading.textContent = chapter.chapterTitle;
          chapterBlock.appendChild(heading);

          chapter.lessons.forEach(function (lesson) {
            const row = document.createElement('div');
            row.className = 'lesson-row';

            const link = document.createElement('a');
            link.className = 'lesson-link';
            link.href = 'courses/' + course.courseId + '/chapter-' + chapter.chapterId + '/' + lesson.lessonId + '/';
            link.textContent = lesson.lessonTitle;
            row.appendChild(link);

            const status = document.createElement('span');
            // NOTE: this key format must match what tracking.js actually
            // writes via Storage.markLessonCompletedLocally — chapterId and
            // lessonId are stored WITHOUT their "chapter-"/"lesson-" prefix
            // (see tracking.js deriveLessonMetadata). Using the catalog's
            // prefixed lesson.lessonId here directly ("lesson-01") never
            // matched the stored key and silently always showed "Not
            // started" — fixed by stripping the prefix the same way.
            const lessonNum = lesson.lessonId.replace(/^lesson-/, '');
            const completedKey = 'completed_' + course.courseId + '_' + chapter.chapterId + '_' + lessonNum;
            const isCompleted = localStorage.getItem(completedKey) === 'true';
            status.className = 'lesson-status ' + (isCompleted ? 'completed' : 'not-started');
            status.textContent = isCompleted ? 'Completed' : 'Not started';
            row.appendChild(status);

            chapterBlock.appendChild(row);
          });

          courseCard.appendChild(chapterBlock);
        });

        listEl.appendChild(courseCard);
      });
    })();
  </script>
</body>
</html>
