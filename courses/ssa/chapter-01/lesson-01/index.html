<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson — Welcome to the Course — MAS 303a</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../../css/portal.css">
</head>
<body>

  <header class="site-header">
    <div class="shell">
      <div class="brand">Microlearning <span class="brand-mark">Portal</span></div>
      <div class="student-chip">
        <span id="student-id-display">—</span>
      </div>
    </div>
  </header>

  <main>
    <div class="shell">

      <div class="lesson-meta-bar">
        <span>SSA<span class="crumb-sep">/</span>Chapter 01<span class="crumb-sep">/</span>Lesson 01</span>
        <a href="../../../../courses.html">&larr; Back to courses</a>
      </div>

      <div class="lesson-frame-wrap">
        <!--
          The Rise 360 export's own exported index.html goes here, unzipped
          into this same lesson-01/ folder as e.g. "rise/index.html",
          and is loaded in this iframe. Wrapping it this way means the Rise
          export itself never needs to be edited or have tracking.js injected
          into it directly — all tracking lives in THIS wrapper page instead,
          which is what actually gets edited/maintained.
        -->
        <iframe
          id="rise-frame"
          src="rise/index.html"
          title="Welcome to the Course — MAS 303a"
          allow="autoplay"
        ></iframe>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="shell">Microlearning Portal · this lesson's progress is recorded automatically</div>
  </footer>

  <script src="../../../../js/storage.js"></script>
  <script src="../../../../js/api.js"></script>
  <script src="../../../../js/tracking.js"></script>
  <script src="../../../../js/rise-integration.js"></script>
  <script>
    document.getElementById('student-id-display').textContent = Storage.getStudentId() || '—';

    // Manual fallback for testing/demo purposes only — remove once real
    // Rise completion detection (rise-integration.js) is confirmed working
    // for this lesson's specific Rise export configuration. Useful while
    // developing: open devtools console and run window.markLessonComplete()
    // to simulate Rise signaling completion.
  </script>
</body>
</html>
