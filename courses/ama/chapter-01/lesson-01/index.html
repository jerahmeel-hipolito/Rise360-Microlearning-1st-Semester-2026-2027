<body>

  <header class="site-header">
    <div class="shell">
      <div class="brand">Microlearning <span class="brand-mark">Portal</span></div>
      <div class="student-chip">
        <span id="student-id-display">—</span>
      </div>
    </div>
  </header>

  <main>
    <div class="shell">

      <div class="lesson-meta-bar">
        <span>AMA<span class="crumb-sep">/</span>Chapter 01<span class="crumb-sep">/</span>Lesson 01</span>
        <a href="../../../../courses.html">&larr; Back to courses</a>
      </div>

      <div class="lesson-frame-wrap">
        <!--
          The Rise 360 export's own exported index.html goes here, unzipped
          into this same lesson-01/ folder as e.g. "rise/index.html", and is
          loaded in this iframe. Wrapping it this way means the Rise export
          itself never needs to be edited or have tracking.js injected into
          it directly — all tracking lives in THIS wrapper page instead,
          which is what actually gets edited/maintained.

          If you'd rather inject tracking.js directly into the Rise export's
          own HTML instead of using an iframe wrapper, that works too — the
          tracking calls (Tracking.init() / Tracking.onLessonComplete()) are
          identical either way. The iframe approach is recommended because
          it means re-exporting a lesson from Rise (e.g. after a content fix)
          never risks clobbering injected tracking code, since nothing was
          ever added to the Rise export's own files.
        -->
        <iframe
          id="rise-frame"
          src="rise/index.html"
          title="Introduction to Multivariate Analysis"
          allow="autoplay"
        ></iframe>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="shell">Microlearning Portal · this lesson's progress is recorded automatically</div>
  </footer>

  <script src="../../../../js/storage.js"></script>

    // working for this lesson's specific Rise export configuration.

    // window.markLessonComplete() to simulate Rise signaling completion.
  </script>
</body>
